[pytest]
# pytest configuration
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Coverage
# Run focused coverage separately, for example:
# pytest tests/unit tests/test_streaming_handler.py tests/test_master_prompt_engine.py --cov=auth --cov=educational_engine --cov=verification --cov-report=term-missing
addopts = 
    --verbose
    --strict-markers
    -ra
    --tb=short

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    slow: Slow running tests
    auth: Authentication tests
    rag: RAG pipeline tests
    database: Database tests
    cache: Cache tests
    api: API tests
    websocket: WebSocket tests
    load: Load tests

# Ignore
norecursedirs = .git .tox dist build *.egg venv node_modules frontend

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
